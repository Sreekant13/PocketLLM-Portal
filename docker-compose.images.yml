version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m

  backend:
    image: sreekant13/pocketllm-backend:latest
    container_name: pocketllm-backend
    depends_on:
      - ollama
    ports:
      - "3001:3001"

  frontend:
    image: sreekant13/pocketllm-frontend:latest
    container_name: pocketllm-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  ollama-data:
