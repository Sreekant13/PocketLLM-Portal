version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      # CPU-only is fine; no GPU required for our use case.
      - OLLAMA_KEEP_ALIVE=5m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pocketllm-backend
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_ID=llama3.2:3b
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pocketllm-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  ollama-data:
